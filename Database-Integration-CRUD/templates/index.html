<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DecodeLabs CRUD Project</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h2 class="text-center">
                Database Integration (CRUD)
            </h2>

        </div>

        <div class="card-body">

            <form id="userForm">

                <div class="row">

                    <div class="col-md-4">

                        <input
                            type="text"
                            class="form-control"
                            id="name"
                            placeholder="Enter Name"
                            required>

                    </div>

                    <div class="col-md-4">

                        <input
                            type="email"
                            class="form-control"
                            id="email"
                            placeholder="Enter Email"
                            required>

                    </div>

                    <div class="col-md-2">

                        <input
                            type="number"
                            class="form-control"
                            id="age"
                            placeholder="Age"
                            required>

                    </div>

                    <div class="col-md-2">

                        <button
                            class="btn btn-success w-100"
                            type="submit">

                            Add User

                        </button>

                    </div>

                </div>

            </form>

            <hr>

            <table
                class="table table-bordered table-hover mt-4">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Age</th>

                    <th>Status</th>

                    <th>Created</th>

                    <th>Actions</th>

                </tr>

                </thead>

                <tbody id="userTable">

                </tbody>

            </table>

        </div>

    </div>

</div>

<script
src="{{ url_for('static', filename='script.js') }}">
</script>

</body>

</html>
